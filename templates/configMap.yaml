apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-demo-cm
data:
  player_initial_lives: {{ .Values.player_initial_lives }}
  player_name: {{ .Values.player_name | quote }}
  ui_properties_file_name: {{ .Values.ui_properties_file_name | quote }}
  env: {{ .Values.env | default "sandBox" | quote }}